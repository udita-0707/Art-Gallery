# Render Blueprint — deploy via Dashboard → New → Blueprint → connect this repo
# Or create a Web Service manually with the build/start commands below.

services:
  - type: web
    name: spectrum-api
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm install && npm run build:server
    startCommand: node apps/server/dist/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
